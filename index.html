<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPR Card Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="controls">
        <input 
            id="armyLink" 
            aria-label="Army Forge shared link or list ID"
            placeholder="Paste your shared Army Forge link or list ID..."
        >
        <button id="btnGenerate">Generate Cards</button>
        <button id="btnPrint">Print</button>
    </div>

    <div id="cards" class="cards"></div>
    <div id="special-rules" class="special-rules-section"></div>
    <div id="spells" class="special-rules-section"></div>

    <script type="module" src="index.ts"></script>
</body>
</html>
